<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AncloraAdapt — Estrategia y Análisis de Producto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Libre+Baskerville:wght@700&display=swap" rel="stylesheet">
    <style>
        /* ====== TOKENS (Anclora base) ====== */
        /* Light Theme Defaults (Anclora base) */
        :root, body.light-theme {
            --azul-profundo:#23436B;   /* headings, barras */
            --azul-claro:#2EAFC4;      /* CTAs, acentos */
            --ambar:#FFC979;           /* highlights cálidos */
            --gris-fondo:#F6F7F9;      /* fondos suaves */
            --texto:#162032;           /* texto principal */
            --blanco:#FFFFFF;          /* fondos primarios */
            /* Additional vars for dynamic elements */
            --input-bg: var(--gris-fondo);
            --input-border: #ddd;
            --card-bg: var(--blanco);
            --card-border: #E5EAF0;
            --checkbox-bg: #ecf0f1;
            --tab-border-bottom: #e0e0e0;
            --chat-message-ai-bg: #e0e0e0;
            /* Warning message specific for light theme */
            --warning-bg: var(--ambar);
            --warning-text-color: var(--texto);
            --warning-link-color: var(--azul-profundo);
        }

        /* Dark Theme Overrides */
        body.dark-theme {
            --azul-profundo:#A0C4FF;   /* Lighter blue for dark mode */
            --azul-claro:#87CEEB;      /* Lighter turquoise */
            --ambar:#FDD793;           /* Lighter amber */
            --gris-fondo:#1C2C3A;      /* Darker background */
            --texto:#E0E6EB;           /* Light text */
            --blanco:#2B3B4C;          /* Darker primary background */
            /* Additional vars for dynamic elements */
            --input-bg: #3C4C5D;
            --input-border: #556677;
            --card-bg: #2B3B4C;
            --card-border: #405060;
            --checkbox-bg: #3C4C5D;
            --tab-border-bottom: #405060;
            --chat-message-ai-bg: #3C4C5D;
            /* Warning message specific for dark theme */
            --warning-bg: #3A3020; /* Darker, desaturated amber for warning background */
            --warning-text-color: var(--texto); /* Light text for warning content */
            --warning-link-color: var(--azul-claro); /* Lighter blue for links within dark warnings */
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: var(--gris-fondo); /* Use Anclora background color */
            color: var(--texto); /* Use Anclora text color */
        }
        #root {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Base typography from Anclora design system */
        .h1, h1 { font: 700 38px/1.15 "Libre Baskerville", serif; color: var(--azul-profundo); margin: 0 0 8px; }
        .h2, h2 { font: 700 26px/1.25 Inter, sans-serif; color: var(--azul-profundo); margin: 0 0 12px; }
        .h3, h3 { font: 700 18px/1.35 Inter, sans-serif; color: var(--texto); margin: 0 0 8px; }
        p, li { font: 400 15px/1.6 Inter, sans-serif; margin: 0 0 10px; }
        .muted { opacity:.85; }
        .tag{ display:inline-block; padding:6px 10px; border-radius:8px; font:600 12px/1 Inter; background:#EAF7FA; color:#0f3b47; margin-right:8px; }
        .hr{ height:3px; background: linear-gradient(90deg, var(--azul-claro), var(--ambar)); border:none; margin:16px 0 10px; }
        .card{ background: var(--blanco); border:1px solid #E5EAF0; border-radius:14px; padding:16px 18px; }
        .callout{ background: linear-gradient(90deg,#fef7ea,#fff); border-left:4px solid var(--ambar); border-radius:10px; padding:14px 16px; }
        .hero-section{ /* Renamed to avoid conflict, adapted for app sections */
            background: linear-gradient(120deg, var(--azul-profundo), var(--azul-claro));
            color:var(--blanco); border-radius:18px; padding:28px 30px; margin-bottom:16px;
        }
    </style>
